<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS 地图展示系统</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.29/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei";
        }
        body { height: 100vh; display: flex; flex-direction: column; }
        .header {
            height: 60px;
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
        }
        .main { flex: 1; display: flex; }
        .basemap-gallery {
            width: 240px;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            padding: 10px;
        }
        .map-container { flex: 1; }
        #viewDiv { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="header">WebGIS 地图展示系统 — 空间信息与数字技术</div>

<div class="main">
    <div class="basemap-gallery">
        <h3>底图切换</h3>
        <div id="basemapGallery"></div>
    </div>
    <div class="map-container"><div id="viewDiv"></div></div>
</div>

<script>
require([
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Legend",
    "esri/widgets/ScaleBar",
    "esri/widgets/LayerList",
    "esri/widgets/Search",
    "esri/layers/FeatureLayer"
], function(Map, MapView, BasemapGallery, Legend, ScaleBar, LayerList, Search, FeatureLayer) {

    // 1. 创建地图
    const map = new Map({ basemap: "streets-vector" });

    // 2. 创建视图
    const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [116.4, 39.9],
        zoom: 4
    });

    // ----------------------
    // ✅ GeoScene Online 公开图层（中国主要城市）
    // ----------------------
    const geoSceneLayer = new FeatureLayer({
        url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/ArcGIS/rest/services/World_Cities/FeatureServer/0",
        title: "GeoScene Online 世界城市点位",
        renderer: {
            type: "simple",
            symbol: {
                type: "simple-marker",
                color: "#ff4444",
                size: 8,
                outline: { color: "#fff", width: 1.5 }
            }
        }
    });
    map.add(geoSceneLayer);

    // ----------------------
    // 3. 所有微件
    // ----------------------
    const bmGallery = new BasemapGallery({ view, container: "basemapGallery" });
    view.ui.add(new Legend({ view }), "bottom-right");
    view.ui.add(new ScaleBar({ view, unit: "metric" }), "bottom-left");
    view.ui.add(new LayerList({ view }), "top-right");
    view.ui.add(new Search({ view, includeDefaultSources: true }), "top-left");
});
</script>

</body>
</html>
